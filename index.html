<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по Ревматологии — НЦНЭ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Мягкая палитра для снижения утомляемости глаз */
    --bg: #1a1e24;
    --surface: #222831;
    --surface2: #2b323d;
    --border: #393e46;
    --accent: #4b86b4;
    --accent2: #7c5cbf;
    --correct: #2ea44f;
    --wrong: #cb2431;
    --text: #e1e4e8;
    --muted: #8b949e;
    --gold: #f0b429;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    line-height: 1.6;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 720px;
    margin-top: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 25px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* Карточки */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    margin-bottom: 20px;
    transition: all 0.3s ease;
  }

  .progress-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .bar-bg {
    background: var(--surface2);
    height: 6px;
    border-radius: 3px;
    width: 100%;
    margin-right: 15px;
    overflow: hidden;
  }

  .bar-fill {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 25px;
    color: #f0f3f6;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px 18px;
    text-align: left;
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    transition: background 0.2s, border-color 0.2s;
  }

  .option-btn:hover:not(:disabled) {
    background: var(--border);
    border-color: var(--accent);
  }

  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    margin-right: 12px;
    color: var(--accent);
    background: rgba(75, 134, 180, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* Состояния ответов */
  .option-btn.correct {
    background: rgba(46, 164, 79, 0.15) !important;
    border-color: var(--correct) !important;
  }
  .option-btn.correct .option-letter {
    background: var(--correct) !important;
    color: #fff !important;
  }

  .option-btn.wrong {
    background: rgba(203, 36, 49, 0.15) !important;
    border-color: var(--wrong) !important;
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong) !important;
    color: #fff !important;
  }

  /* Кнопки управления */
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn:hover:not(:disabled) {
    background: var(--surface2);
    border-color: var(--muted);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
  }
  .btn-primary:hover:not(:disabled) {
    background: #3b739c;
  }

  /* Экран результатов */
  .result-screen {
    display: none;
  }

  .score-board {
    text-align: center;
    padding: 30px 0;
  }

  .score-num {
    font-size: 64px;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 10px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 25px;
  }

  .stat-box {
    background: var(--surface2);
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .stat-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
  }

  .stat-lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .review-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 5px;
  }

  /* Кастомный скроллбар */
  .review-list::-webkit-scrollbar { width: 6px; }
  .review-list::-webkit-scrollbar-track { background: transparent; }
  .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .rc-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .rc-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .rc-num { color: var(--muted); }
  .rc-badge { font-weight: 500; }
  .rc-badge.correct { color: var(--correct); }
  .rc-badge.wrong { color: var(--wrong); }
  .rc-badge.skipped { color: var(--gold); }

  .rc-question {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .rc-option {
    font-size: 13px;
    display: flex;
    margin-top: 4px;
    padding: 6px;
    border-radius: 4px;
  }
  .rc-option.user-wrong { background: rgba(203,36,49,0.15); color: #ff9e9e; }
  .rc-option.is-correct { background: rgba(46,164,79,0.15); color: #9effbc; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Ревматология</h1>
    <div class="subtitle">Подготовка к НЦНЭ</div>
  </header>

  <div id="quiz-screen" class="card">
    <div class="progress-container">
      <div class="bar-bg"><div id="progress-bar" class="bar-fill"></div></div>
      <span id="progress-text">0 / 0</span>
    </div>

    <div id="question-text" class="q-text">Загрузка вопроса...</div>
    <div id="options-block" class="options-list"></div>

    <div class="controls">
      <button id="btn-back" class="btn" disabled>
        ← Назад
      </button>
      <button id="btn-skip" class="btn">
        Пропустить
      </button>
      <button id="btn-next" class="btn btn-primary" disabled>
        Дальше →
      </button>
    </div>
  </div>

  <div id="result-screen" class="card result-screen">
    <div class="score-board">
      <div id="score-percent" class="score-num">0%</div>
      <p style="color: var(--muted);">Тестирование завершено</p>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div id="stat-correct" class="stat-val" style="color:var(--correct)">0</div><div class="stat-lbl">Правильно</div></div>
      <div class="stat-box"><div id="stat-wrong" class="stat-val" style="color:var(--wrong)">0</div><div class="stat-lbl">Ошибки</div></div>
      <div class="stat-box"><div id="stat-skipped" class="stat-val" style="color:var(--gold)">0</div><div class="stat-lbl">Пропущено</div></div>
      <div class="stat-box"><div id="stat-total" class="stat-val">0</div><div class="stat-lbl">Всего вопросов</div></div>
    </div>

    <div style="margin-top:20px;">
      <h3 style="font-size:16px; margin-bottom:12px;">Работа над ошибками</h3>
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="wrong">Ошибки</button>
        <button class="filter-btn" data-filter="skipped">Пропущенные</button>
      </div>
      <div id="review-container" class="review-list"></div>
    </div>

    <div class="controls" style="margin-top:25px;">
      <button id="btn-retry" class="btn">Пройти заново</button>
      <button id="btn-shuffle" class="btn btn-primary">Перемешать и начать</button>
    </div>
  </div>
</div>

    q: "У мужчины — рецидивирующий синусит с кровянистыми выделениями. На КТ легких — узлы с очагами распада. ОАМ — протеинурия и гематурия. цАНЦА резко положительные. СОЭ 65 мм/ч. С какого препарата следует начать лечение?",
    o: [
      "циклофосфан",
      "ритуксимаб",
      "инфликсимаб",
      "такролимус",
      "микофенолата мофетил"
    ],
    a: 0
  },
  {
    n: 100,
    q: "У больного 36 лет, длительно болеющего ревматоидным артритом, в моче обнаружена протеинурия до 3,5 г/л. Осложнение, развившееся у больного:",
    o: [
      "Амилоидоз почек",
      "Хронический пиелонефрит",
      "Хронический гломерулонефрит",
      "Интерстициальный нефрит",
      "Хроническая почечная недостаточность"
    ],
    a: 0
  }
];

let questions = [...QUESTIONS];
let currentIndex = 0;
let userAnswers = {}; // Храним ответы по индексам: { index: { status: 'correct'|'wrong'|'skipped', choice: ID } }

const letters = ['A', 'B', 'C', 'D', 'E'];

// Элементы интерфейса
const qScreen = document.getElementById('quiz-screen');
const rScreen = document.getElementById('result-screen');
const qText = document.getElementById('question-text');
const oBlock = document.getElementById('options-block');
const pBar = document.getElementById('progress-bar');
const pText = document.getElementById('progress-text');

const btnBack = document.getElementById('btn-back');
const btnSkip = document.getElementById('btn-skip');
const btnNext = document.getElementById('btn-next');

function initQuiz() {
  currentIndex = 0;
  userAnswers = {};
  qScreen.style.display = 'block';
  rScreen.style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentIndex];
  
  // Обновление прогресс-бара
  const progressPercent = ((currentIndex) / questions.length) * 100;
  pBar.style.width = `${progressPercent}%`;
  pText.innerText = `${currentIndex + 1} / ${questions.length}`;

  // Текст вопроса
  qText.innerText = q.q;
  oBlock.innerHTML = '';

  // Блокировка/разблокировка кнопки «Назад»
  btnBack.disabled = currentIndex === 0;

  // Если на этот вопрос уже был дан ответ ранее
  const savedAnswer = userAnswers[currentIndex];

  q.o.forEach((option, idx) => {
    const button = document.createElement('button');
    button.className = 'option-btn';
    button.innerHTML = `<span class="option-letter">${letters[idx]}</span><span>${option}</span>`;
    
    if (savedAnswer) {
      // Подсветка сохраненного ответа
      button.disabled = true;
      if (idx === q.a) {
        button.classList.add('correct');
      }
      if (savedAnswer.status === 'wrong' && idx === savedAnswer.choice) {
        button.classList.add('wrong');
      }
    } else {
      button.addEventListener('click', () => handleAnswer(idx));
    }
    oBlock.appendChild(button);
  });

  // Управление кнопками навигации
  if (savedAnswer) {
    btnSkip.disabled = true;
    btnNext.disabled = false;
  } else {
    btnSkip.disabled = false;
    btnNext.disabled = true;
  }
}

function handleAnswer(choiceIdx) {
  const q = questions[currentIndex];
  const isCorrect = choiceIdx === q.a;

  userAnswers[currentIndex] = {
    status: isCorrect ? 'correct' : 'wrong',
    choice: choiceIdx
  };

  // Мгновенная визуализация для запоминания
  const buttons = oBlock.querySelectorAll('.option-btn');
  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === q.a) {
      btn.classList.add('correct'); // Всегда подсвечиваем верный
    }
    if (!isCorrect && idx === choiceIdx) {
      btn.classList.add('wrong'); // Если ошибся — подсвечиваем ошибку
    }
  });

  btnSkip.disabled = true;
  btnNext.disabled = false;
}

// Кнопка Пропустить
btnSkip.addEventListener('click', () => {
  userAnswers[currentIndex] = {
    status: 'skipped',
    choice: null
  };
  stepNext();
});

// Кнопка Назад
btnBack.addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion();
  }
});

// Кнопка Дальше
btnNext.addEventListener('click', () => {
  stepNext();
});

function stepNext() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  qScreen.style.display = 'none';
  rScreen.style.display = 'block';

  let correctCount = 0;
  let wrongCount = 0;
  let skippedCount = 0;

  Object.values(userAnswers).forEach(ans => {
    if (ans.status === 'correct') correctCount++;
    if (ans.status === 'wrong') wrongCount++;
    if (ans.status === 'skipped') skippedCount++;
  });

  const percent = questions.length ? Math.round((correctCount / questions.length) * 100) : 0;
  
  document.getElementById('score-percent').innerText = `${percent}%`;
  document.getElementById('stat-correct').innerText = correctCount;
  document.getElementById('stat-wrong').innerText = wrongCount;
  document.getElementById('stat-skipped').innerText = skippedCount;
  document.getElementById('stat-total').innerText = questions.length;

  renderReview('all');
}

function renderReview(filter) {
  const list = document.getElementById('review-container');
  list.innerHTML = '';

  questions.forEach((q, idx) => {
    const ans = userAnswers[idx] || { status: 'skipped', choice: null };
    
    if (filter !== 'all' && ans.status !== filter) return;

    const card = document.createElement('div');
    card.className = 'rc-card';

    let badgeText = 'Пропущено';
    let badgeClass = 'skipped';
    if (ans.status === 'correct') { badgeText = 'Правильно'; badgeClass = 'correct'; }
    if (ans.status === 'wrong') { badgeText = 'Ошибка'; badgeClass = 'wrong'; }

    let optsHtml = '';
    q.o.forEach((opt, j) => {
      let css = '';
      if (j === q.a) css = 'is-correct';
      if (ans.status === 'wrong' && j === ans.choice) css = 'user-wrong';

      optsHtml += `<div class="rc-option ${css}"><span style="font-weight:600;margin-right:8px;">${letters[j]}</span><span>${opt}</span></div>`;
    });

    card.innerHTML = `
      <div class="rc-meta">
        <span class="rc-num">№${q.n}</span>
        <span class="rc-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="rc-question">${q.q}</div>
      <div class="rc-options">${optsHtml}</div>
    `;
    list.appendChild(card);
  });

  if (list.children.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;font-size:14px;">Нет вопросов в этой категории.</p>';
  }
}

// Фильтры результатов
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReview(btn.dataset.filter);
  });
});

// Перезапуск
function shuffleArr(array) {
  return array.sort(() => Math.random() - 0.5);
}

document.getElementById('btn-retry').addEventListener('click', () => {
  questions = [...QUESTIONS];
  initQuiz();
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  questions = shuffleArr([...QUESTIONS]);
  initQuiz();
});

// Старт при загрузке
window.onload = initQuiz;
</script>
</body>
</html>
